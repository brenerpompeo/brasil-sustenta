name: Test

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: 20 Action/21 Projects/brasil-sustenta
    env:
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      JWT_SECRET: test-secret-32-chars-minimum-value
      DATABASE_URL: ""
      OPENAI_API_KEY: ""
      GEMINI_API_KEY: ""
      OWNER_OPEN_ID: ""
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 20 Action/21 Projects/brasil-sustenta/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run check

      - name: Unit tests
        run: npm run test:unit

      - name: E2E smoke
        run: npm run test:e2e

      - name: Suzely benchmark
        run: npm run benchmark:suzely
